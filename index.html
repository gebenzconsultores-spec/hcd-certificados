<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hablando con Datos — Sistema de Certificados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', sans-serif; background: #f8f9fb; color: #1a1a2e; }
      :root {
        --hcd-red: #8B1A1A;
        --hcd-red-dark: #6B1414;
        --hcd-red-light: #f9f0f0;
        --hcd-gray: #64748b;
        --hcd-border: #e2e8f0;
        --hcd-bg: #f8f9fb;
        --hcd-white: #ffffff;
        --hcd-text: #1e293b;
        --hcd-text-light: #64748b;
      }
      /* Ocultar flechas de los campos numéricos (se llenan a mano) */
      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
      input[type=number] { -moz-appearance: textfield; appearance: textfield; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
